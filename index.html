  "linear-gradient(150deg, #E5DAC5 0%, #C7B693 100%)",
  "linear-gradient(150deg, #DFD8C0 0%, #BEC098 100%)",

function initial(name) {
  const m = name.match(/[A-Za-zА-Яа-яЁё0-9]/);
  return m ? m[0].toUpperCase() : "\u2022";
}

const STYLES = `
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@300;400;500;600&display=swap');

.yo-root{
  --bg:#F5F1EA; --surface:#FBF8F2; --ink:#2A2621; --muted:#867D6F;
  --line:#E5DDCF; --accent:#6D7357; --accent-deep:#565B41;
  background:var(--bg); color:var(--ink);
  font-family:'Inter',system-ui,sans-serif;
  min-height:100vh; -webkit-font-smoothing:antialiased;
}
.yo-serif{font-family:'Fraunces',Georgia,serif;}
.yo-wrap{max-width:1120px;margin:0 auto;padding:0 22px;}

.yo-header{padding:38px 0 6px;}
.yo-brand{font-size:19px;font-weight:500;color:var(--ink);}
.yo-eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-top:6px;}

.yo-grid{display:grid;grid-template-columns:1fr;gap:26px;padding:32px 0 90px;}
@media(min-width:640px){.yo-grid{grid-template-columns:repeat(2,1fr);gap:30px;}}
@media(min-width:1000px){.yo-grid{grid-template-columns:repeat(3,1fr);gap:36px;}}

.yo-card{cursor:pointer;text-align:left;border:none;background:transparent;padding:0;font:inherit;color:inherit;width:100%;
  transition:transform .5s cubic-bezier(.2,.7,.2,1);}
.yo-card:hover{transform:translateY(-6px);}
.yo-media{aspect-ratio:4/5;border-radius:18px;overflow:hidden;position:relative;background:var(--surface);
  box-shadow:0 10px 26px -18px rgba(42,38,33,.45);transition:box-shadow .5s ease;}
.yo-card:hover .yo-media{box-shadow:0 20px 44px -22px rgba(42,38,33,.5);}
.yo-media img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .7s cubic-bezier(.2,.7,.2,1);}
.yo-card:hover .yo-media img{transform:scale(1.04);}
.yo-fill{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.yo-mono{font-family:'Fraunces',Georgia,serif;font-size:92px;font-weight:400;line-height:1;color:rgba(52,44,34,.20);user-select:none;}
.yo-name{margin-top:15px;font-family:'Fraunces',Georgia,serif;font-size:20px;line-height:1.25;font-weight:400;}
.yo-card:hover .yo-name{color:var(--accent-deep);}

.yo-back{display:inline-flex;align-items:center;gap:8px;background:none;border:none;cursor:pointer;font:inherit;
  color:var(--muted);font-size:14px;padding:0;margin:32px 0 4px;transition:color .3s ease;}
.yo-back:hover{color:var(--ink);}
.yo-back .a{font-size:18px;line-height:1;transform:translateY(1px);}

.yo-detail{padding-bottom:100px;}
.yo-hero{aspect-ratio:16/9;border-radius:22px;overflow:hidden;margin-top:20px;position:relative;
  box-shadow:0 20px 50px -30px rgba(42,38,33,.5);}
.yo-hero img{width:100%;height:100%;object-fit:cover;display:block;}
.yo-hero .yo-mono{font-size:130px;}
.yo-gallery{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:12px;}
@media(min-width:700px){.yo-gallery{grid-template-columns:repeat(3,1fr);}}
.yo-gallery .g{aspect-ratio:1/1;border-radius:14px;overflow:hidden;}
.yo-gallery img{width:100%;height:100%;object-fit:cover;display:block;}

.yo-title{font-family:'Fraunces',Georgia,serif;font-weight:400;font-size:32px;line-height:1.12;margin:36px 0 0;max-width:22ch;}
@media(min-width:700px){.yo-title{font-size:40px;}}
.yo-lead{color:#5c554a;font-size:16px;line-height:1.72;margin-top:18px;max-width:62ch;font-weight:300;}
.yo-meta{margin-top:18px;max-width:62ch;display:flex;flex-direction:column;gap:5px;}
.yo-meta .m{font-size:13.5px;color:var(--muted);}

.yo-priceblock{margin-top:30px;border:1px solid var(--line);border-radius:16px;background:var(--surface);
  padding:20px 22px;max-width:62ch;display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap;}
.yo-priceblock .lbl{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);}
.yo-priceblock .val{font-family:'Fraunces',Georgia,serif;font-size:23px;color:var(--ink);}

.yo-items{margin-top:26px;max-width:62ch;display:flex;flex-direction:column;gap:14px;}
.yo-item{border:1px solid var(--line);border-radius:16px;background:var(--surface);padding:22px 22px;}
.yo-item .iname{font-family:'Fraunces',Georgia,serif;font-size:21px;line-height:1.2;}
.yo-item .idesc{color:#5c554a;font-size:14.5px;line-height:1.68;margin-top:11px;font-weight:300;}
.yo-item .imeta{margin-top:11px;display:flex;flex-direction:column;gap:4px;}
.yo-item .imeta .m{font-size:13px;color:var(--muted);}
.yo-item .iprice{font-family:'Fraunces',Georgia,serif;font-size:18px;line-height:1.45;color:var(--accent-deep);margin-top:13px;}
.yo-item .yo-btn{margin-top:16px;}

.yo-btn{display:inline-flex;align-items:center;justify-content:center;background:#B86B4B !important;color:#F7F4EC;border:none;
  cursor:pointer;font:inherit;font-size:15px;font-weight:500;padding:14px 30px;border-radius:100px;text-decoration:none;
  transition:background .3s ease,transform .3s ease;}
.yo-btn:hover{background:#9E5638 !important;transform:translateY(-2px);}
.yo-cta{margin-top:32px;}
@media(max-width:520px){.yo-cta,.yo-item .yo-btn{width:100%;}}

@keyframes yoUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}
.yo-anim{animation:yoUp .55s cubic-bezier(.2,.7,.2,1) both;}
.yo-view{animation:yoUp .45s cubic-bezier(.2,.7,.2,1) both;}
@media(prefers-reduced-motion:reduce){.yo-anim,.yo-view{animation:none;}.yo-card,.yo-media img,.yo-btn{transition:none;}.yo-card:hover{transform:none;}}
.yo-card:focus-visible .yo-media,.yo-btn:focus-visible,.yo-back:focus-visible{outline:2px solid var(--accent-deep);outline-offset:3px;}
`;

var st = document.createElement('style');
st.textContent = STYLES;
document.head.appendChild(st);

var app = document.getElementById('app');
function esc(x){return String(x).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function placeholderHTML(name,i){return '<div class="yo-fill" style="background:'+GRADIENTS[i%GRADIENTS.length]+'"><span class="yo-mono">'+esc(initial(name))+'</span></div>';}
function bookBtn(){return '<a class="yo-btn" style="background-color:#B86B4B !important;color:#F7F4EC !important;border-color:#B86B4B !important;-webkit-appearance:none;appearance:none;" href="'+CONFIG.bookingUrl+'" target="_blank" rel="noopener noreferrer">Записаться</a>';}
function metaHTML(lines,cls){if(!lines||!lines.length)return '';return '<div class="'+cls+'">'+lines.map(function(l){return '<div class="m">'+esc(l)+'</div>';}).join('')+'</div>';}

function renderCatalog(){
  var cards = SERVICES.map(function(s,i){
    var media = (s.cardImage||(s.photos&&s.photos[0])) ? '<img src="'+(s.cardImage||s.photos[0])+'" alt="'+esc(s.name)+'">' : placeholderHTML(s.name,i);
    return '<button class="yo-card yo-anim" style="animation-delay:'+Math.min(i*70,500)+'ms" data-i="'+i+'"><div class="yo-media">'+media+'</div><div class="yo-name">'+esc(s.name)+'</div></button>';
  }).join('');
  app.innerHTML = '<div class="yo-view"><header class="yo-header yo-wrap">'+(CONFIG.brand?'<div class="yo-brand yo-serif">'+esc(CONFIG.brand)+'</div>':'')+'<div class="yo-eyebrow">Услуги</div></header><div class="yo-wrap"><div class="yo-grid">'+cards+'</div></div></div>';
  Array.prototype.forEach.call(app.querySelectorAll('.yo-card'), function(b){ b.addEventListener('click', function(){ renderDetail(+b.dataset.i); }); });
  window.scrollTo(0,0);
}

function renderDetail(i){
  var s = SERVICES[i]; var photos = s.photos||[];
  var hero = (s.coverImage||photos[0]||s.cardImage) ? '<img src="'+(s.coverImage||photos[0]||s.cardImage)+'" alt="'+esc(s.name)+'">' : placeholderHTML(s.name,i);
  var gallery = photos.length>1 ? '<div class="yo-gallery">'+photos.slice(1).map(function(p){return '<div class="g"><img src="'+p+'" alt=""></div>';}).join('')+'</div>' : '';
  var body;
  if(s.items){
    body = '<div class="yo-items">'+s.items.map(function(it){
      return '<div class="yo-item"><div class="iname">'+esc(it.name)+'</div>'+(it.description?'<div class="idesc">'+esc(it.description)+'</div>':'')+metaHTML(it.meta,'imeta')+(it.price?'<div class="iprice">'+esc(it.price)+'</div>':'')+bookBtn()+'</div>';
    }).join('')+'</div>';
  } else {
    body = '<div class="yo-priceblock"><span class="lbl">Стоимость</span><span class="val">'+esc(s.price)+'</span></div><div class="yo-cta">'+bookBtn()+'</div>';
  }
  app.innerHTML = '<div class="yo-view yo-wrap yo-detail"><button class="yo-back" id="back"><span class="a">\u2039</span> Назад к каталогу</button><div class="yo-hero">'+hero+'</div>'+gallery+'<h1 class="yo-title">'+esc(s.name)+'</h1>'+(s.description?'<p class="yo-lead">'+esc(s.description)+'</p>':'')+metaHTML(s.meta,'yo-meta')+body+'</div>';
  document.getElementById('back').addEventListener('click', renderCatalog);
  window.scrollTo(0,0);
}

renderCatalog();
</script>
</body>
</html>
